# pytest.ini — pytest configuration for this project.
#
# Without this file, running `pytest tests/` from the project root would fail
# with ModuleNotFoundError because Python does not know where to find
# `run_automl`, `ml_pipeline`, etc. — they're top-level folders, not installed
# packages.
#
# pythonpath = .  tells pytest to add the project root (`.`) to sys.path
# before collecting tests, making every top-level module importable by name
# without needing `pip install -e .` or setting PYTHONPATH manually.
[pytest]
pythonpath = .
