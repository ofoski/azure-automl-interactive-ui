services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./model_artifacts:/app/model_artifacts
      - ./app.py:/app/app.py
      - ./responsible_ai_analysis.py:/app/responsible_ai_analysis.py
      - ./responsible_ai_agent.py:/app/responsible_ai_agent.py
      - ./model_utils.py:/app/model_utils.py
      - ./run_automl.py:/app/run_automl.py
      - ./register_model.py:/app/register_model.py
      - ./ml_pipeline:/app/ml_pipeline
